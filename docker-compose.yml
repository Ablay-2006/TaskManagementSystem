version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: taskmanagement-db
    environment:
      POSTGRES_DB: project_db
      POSTGRES_USER: project
      POSTGRES_PASSWORD: project
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - taskmanagement-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanagement-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/project_db
      SPRING_DATASOURCE_USERNAME: project
      SPRING_DATASOURCE_PASSWORD: project
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: project_db
      DB_USER: project
      DB_PASSWORD: project
      JWT_SECRET: dGhpc2lzYXZlcnlsb25nand0c2VjcmV0a2V5Zm9ydGhlYWJsYXlzaGFyaW1vdnRhc2ttYW5hZ2VtZW50c3lzdGVt
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    restart: unless-stopped
    networks:
      - taskmanagement-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: taskmanagement-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - taskmanagement-network

volumes:
  postgres_data:
  uploads_data:
  logs_data:

networks:
  taskmanagement-network:
    driver: bridge

